version: '3.8'

services:
  # Banco de dados MySQL
  db:
    image: mysql:8.0
    container_name: financeiro_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: financeiro
      MYSQL_USER: financeiro_user
      MYSQL_PASSWORD: financeiro_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    networks:
      - financeiro_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: financeiro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - financeiro_network
    command: redis-server --appendonly yes

  # Backend PHP
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financeiro_backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: financeiro
      DB_USERNAME: financeiro_user
      DB_PASSWORD: financeiro_pass
      JWT_SECRET: change-this-secret-in-production-min-32-chars
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:4200,http://localhost:80"
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - backend_logs:/var/www/html/logs
      - backend_uploads:/var/www/html/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - financeiro_network

  # Frontend Angular (produção)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: financeiro_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - financeiro_network

  # phpMyAdmin (desenvolvimento)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: financeiro_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: financeiro_user
      PMA_PASSWORD: financeiro_pass
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - financeiro_network
    profiles:
      - dev

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  backend_uploads:
    driver: local

networks:
  financeiro_network:
    driver: bridge